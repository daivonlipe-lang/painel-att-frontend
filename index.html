<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Painel ATT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-box">
    <div class="auth-top">
      <h1>Painel ATT</h1>
      <p>Entrar no sistema</p>
    </div>

    <form id="loginForm" class="auth-form">
      <div class="input-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" placeholder="Digite seu usuário" required />
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required />
      </div>

      <button type="submit" class="botao botao-full">Entrar</button>
      <p id="mensagemLogin" class="mensagem-login"></p>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
